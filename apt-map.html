<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>아파트잡 | 아파트 전문 구인구직 플랫폼</title>
    <link rel="icon" href="/asstes/img/favicon.png" type="image/x-icon">
    <!-- bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <!-- ✅ Font Awesome (권장 CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css" />
    <link rel="stylesheet" href="/assets/css/global.css" />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <link rel="stylesheet" href="/assets/css/head.css" />
    <link rel="stylesheet" href="/assets/css/subPage.css">
    <link rel="stylesheet" href="/assets/css/recruitSearch.css">
</head>

<body>
    <!-- header -->
    <header id="headerWrap"></header>

    <!-- main -->
    <main>
        <section id="subPage" class="recruit-search">
            <h2 class="map-job-header">
                <span class="map-job-header__title">내 주변 공고</span>
                <span class="map-job-header__desc">
                    * 우리집 주소와 근무지까지의 <strong>직선거리</strong>를 확인해보세요
                </span>
            </h2>

            <div class="map-search">
                <!-- 상단 검색 바 -->
                <div class="map-search__top">
                    <button type="button" class="region-btn" id="regionBtn" onclick="toggleRegion()">
                        <span class="region-btn__text">지역</span>
                        <span class="region-btn__arrow"></span>
                    </button>
                    <div class="location-search">
                        <span>우리집 주소 :</span>
                        <input type="text" id="homeAddressInput" class="home-address" placeholder="서울 중구 세종대로 110" readonly>
                        <button type="button" class="btn-move">이동</button>
                    </div>
                </div>

                <!-- 드롭다운 -->
                <div id="regionDropdown" class="region-dropdown">
                    <!-- 헤더 -->
                    <div class="region-header">
                        <div class="region-dropdown__col">시·도</div>
                        <div class="region-dropdown__col">구·군</div>
                    </div>

                    <div class="region-body">
                        <!-- 시/도 -->
                        <ul class="region-list" id="sidoList"></ul>
                        <!-- 구/군 -->
                        <ul class="region-list" id="gugunList"></ul>
                    </div>
                    <!-- 버튼 -->
                    <div class="region-actions">
                        <button type="button" class="btn-cancel">취소</button>
                        <button type="button" class="btn-search">검색</button>
                    </div>
                </div>
            </div>

            <div id="MapArea">
                <div id="mapAlert" class="map-alert">
                    지도는 시·군 단위까지만 확인하실 수 있습니다
                </div>
                <div id="map" class="mapView"></div>

                <!-- 지도 안 우측 슬라이드 패널 -->
                <aside id="jobPanel" class="job-panel" aria-hidden="true">
                    <div class="job-panel__header">
                        <h4 class="job-panel__title">채용공고</h4>
                        <button type="button" class="job-panel__close" onclick="closePanel()"
                            aria-label="채용정보 닫기">✕</button>
                    </div>

                    <div id="jobPanelContent" class="job-panel__body">
                        <div class="job-panel__empty"></div>
                    </div>
                </aside>

                <div class="mapView__job">
                    <h5>직무 선택</h5>
                    <div class="job-filter">
                        <button class="job-filter__btn is-active" onclick="filterMarkers('전체')">
                            <img src="/assets/img/mapapidoc/map-marker-icon.png" class="job-filter__icon" alt="">
                            전체
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('소장', event)">
                            <img src="/assets/img/mapapidoc/map-marker-icon-1.png" class="job-filter__icon" alt="">
                            소장
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('관리과장', event)">
                            <img src="/assets/img/mapapidoc/map-marker-icon-1.png" class="job-filter__icon" alt="">
                            관리과장
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('관리주임', event)">
                            <img src="/assets/img/mapapidoc/map-marker-icon-1.png" class="job-filter__icon" alt="">
                            관리주임
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('경리(회계)', event)">
                            <img src="/assets/img/mapapidoc/map-marker-icon-2.png" class="job-filter__icon" alt="">
                            경리(회계)
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('서무', event)">
                            <img src="/assets/img/mapapidoc/map-marker-icon-2.png" class="job-filter__icon" alt="">
                            서무
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('기술과장', event)">
                            <img src="/assets/img/mapapidoc/map-marker-icon-3.png" class="job-filter__icon" alt="">
                            기술과장
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('시설과장', event)">
                            <img src="/assets/img/mapapidoc/map-marker-icon-3.png" class="job-filter__icon" alt="">
                            시설과장
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('시설기사', event)">
                            <img src="/assets/img/mapapidoc/map-marker-icon-3.png" class="job-filter__icon" alt="">
                            시설기사
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('설비직(영선)', event)">
                            <img src="/assets/img/mapapidoc/map-marker-icon-3.png" class="job-filter__icon" alt="">
                            설비직(영선)
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('기전직', event)">
                            <img src="/assets/img/mapapidoc/map-marker-icon-3.png" class="job-filter__icon" alt="">
                            기전직
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('전기과장', event)">
                            <img src="/assets/img/mapapidoc/map-marker-icon-4.png" class="job-filter__icon" alt="">
                            전기과장
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('전기기사', event)">
                            <img src="/assets/img/mapapidoc/map-marker-icon-4.png" class="job-filter__icon" alt="">
                            전기기사
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('전기직', event)">
                            <img src="/assets/img/mapapidoc/map-marker-icon-4.png" class="job-filter__icon" alt="">
                            전기직
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('커뮤니티', event)">
                            <img src="/assets/img/mapapidoc/map-marker-icon-5.png" class="job-filter__icon" alt="">
                            커뮤니티
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('경비원', event)">
                            <img src="/assets/img/mapapidoc/map-marker-icon-5.png" class="job-filter__icon" alt="">
                            경비원
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('미화원', event)">
                            <img src="/assets/img/mapapidoc/map-marker-icon-5.png" class="job-filter__icon" alt="">
                            미화원
                        </button>
                        <button class="job-filter__btn" onclick="filterMarkers('기타', event)">
                            <img src="/assets/img/mapapidoc/map-marker-icon-5.png" class="job-filter__icon" alt="">
                            기타
                        </button>
                    </div>
                </div>
            </div>
        </section>


        <!-- map job list section -->
        <section id="subPage" class="map-job">
            <div class="job-list-header">
                <h2 class="map-job__title">전체 공고 <span>총 0개</span></h2>
            </div>
            <table class="job-table map-job__table">
                <thead class="map-job__thead">
                    <tr class="map-job__row map-job__row--head">
                        <th class="job-item map-job__cell map-job__cell--favorite"></th>
                        <th class="title job-item map-job__cell map-job__cell--title">공고제목</th>
                        <th class="job-item map-job__cell map-job__cell--job">직무</th>
                        <th class="job-item map-job__cell map-job__cell--pay">급여</th>
                        <th class="company job-item map-job__cell map-job__cell--apt">단지명</th>
                        <th class="job-item map-job__cell map-job__cell--size">단지규모</th>
                        <th class="job-item map-job__cell map-job__cell--date">등록일</th>
                        <th class="end-date job-item map-job__cell map-job__cell--date">마감일</th>
                        <th class="job-item map-job__cell map-job__cell--date">거리</th>
                        <th class="job-item map-job__cell map-job__cell--action"></th>
                    </tr>
                </thead>
                <tbody id="mapJobTableBody" class="map-job__tbody">
                    <!-- JS 데이터 렌더링 -->
                </tbody>
            </table>
        </section>
    </main>

    <!-- footer -->
    <footer id="footer"></footer>
    <!-- Back to Top -->
    <button id="backToTop" class="back-to-top" aria-label="맨 위로 이동" title="맨 위로" type="button">
        <!-- 단순한 화살표 아이콘 (SVG) -->
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M12 4l-8 8h5v8h6v-8h5z"></path>
        </svg>
    </button>

    <script type="text/javascript"
        src="//dapi.kakao.com/v2/maps/sdk.js?appkey=1aeb3e9a49e983e68615734accc31d91&libraries=services,clusterer,drawing"></script>

    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

    <script src="/assets/js/map-js/map-core.js"></script>
    <script src="/assets/js/map-js/map-data.js"></script>
    <script src="/assets/js/map-js/map-marker.js"></script>
    <script src="/assets/js/map-js/map-panel.js"></script>
    <script src="/assets/js/map-js/map-filter.js"></script>
    <script src="/assets/js/map-js/map-search.js"></script>
    <script src="/assets/js/map-js/map-job-list.js"></script>

    <script>
        (function () {
            const isSub = location.pathname.includes("/subPage/");
            const pathPrefix = isSub ? "../" : "./";

            // ✅ header
            const headerEl = document.querySelector("#headerWrap");
            if (headerEl) {
                fetch(pathPrefix + "/assets/components/header.html", { cache: "no-store" })
                    .then(res => res.text())
                    .then(html => {
                        headerEl.innerHTML = html;
                        fixRelativePaths(headerEl);
                    })
                    .catch(err => console.error("Header load error:", err));
            }

            // ✅ footer
            const footerEl = document.querySelector("#footer");
            if (footerEl) {
                fetch(pathPrefix + "/assets/components/footer.html", { cache: "no-store" })
                    .then(res => res.text())
                    .then(html => {
                        footerEl.innerHTML = html;
                        fixRelativePaths(footerEl);
                    })
                    .catch(err => console.error("Footer load error:", err));
            }

            // ✅ 경로 자동 보정 함수
            function fixRelativePaths(container) {
                container.querySelectorAll("img, a, link").forEach(el => {
                    ["src", "href"].forEach(attr => {
                        if (el.hasAttribute(attr)) {
                            const val = el.getAttribute(attr);
                            if (val && !val.startsWith("http") && !val.startsWith("#")) {
                                if (val.startsWith("assets/")) {
                                    el.setAttribute(attr, pathPrefix + val);
                                } else if (val.startsWith("/assets/")) {
                                    el.setAttribute(attr, pathPrefix + val.replace(/^\//, ""));
                                }
                            }
                        }
                    });
                });
            }
        })();
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", () => { var a = document.getElementById("backToTop"); if (!a) return; window.addEventListener("scroll", () => { window.scrollY > 300 ? a.classList.add("show") : a.classList.remove("show") }), a.addEventListener("click", () => { window.scrollTo({ top: 0, behavior: "smooth" }) }) });
    </script>

</body>

</html>
